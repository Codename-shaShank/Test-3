name: Apply Copilot Fixes to Dependabot Branch

on:
  pull_request:
    # Run when Copilot opens/updates its PR
    types: [opened, synchronize, reopened, ready_for_review]
jobs:
  apply-fixes:
    # Only for Copilot PRs (head branch starts with "copilot/")
    if: startsWith(github.event.pull_request.head.ref, 'copilot/')
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Dependabot (base) branch
        uses: actions/checkout@v4
        with:
          # Base branch of the PR: this is your dependabot/... branch
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Merge Copilot branch into Dependabot branch
        env:
          REPO: ${{ github.repository }}
          DEPENDABOT_BRANCH: ${{ github.event.pull_request.base.ref }}
          COPILOT_BRANCH: ${{ github.event.pull_request.head.ref }}
          GH_PAT: ${{ secrets.GH_PAT_FOR_COPILOT }}
        run: |
          set -e

          echo "Base (Dependabot) branch: $DEPENDABOT_BRANCH"
          echo "Copilot branch:         $COPILOT_BRANCH"

          git config user.name "ai-gem-upgrade-bot"
          git config user.email "ai-gem-upgrade-bot@example.com"

          # Use PAT so we can push
          git remote set-url origin "https://x-access-token:${GH_PAT}@github.com/${REPO}.git"

          # Make sure we have both branches
          git fetch origin "$DEPENDABOT_BRANCH"
          git fetch origin "$COPILOT_BRANCH"

          # Ensure we are on the Dependabot branch
          git checkout "$DEPENDABOT_BRANCH"

          # Merge Copilot branch changes into Dependabot branch
          git merge --no-ff "origin/$COPILOT_BRANCH" \
            -m "Merge Copilot fixes from $COPILOT_BRANCH into $DEPENDABOT_BRANCH"

          # Push updated Dependabot branch
          git push origin "HEAD:$DEPENDABOT_BRANCH"

      - name: Close Copilot PR (optional)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_FOR_COPILOT }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DEPENDABOT_BRANCH: ${{ github.event.pull_request.base.ref }}
        run: |
          set -e
          gh pr close "$PR_NUMBER" \
            --repo "$REPO" \
            --comment "Changes from this Copilot branch have been merged directly into $DEPENDABOT_BRANCH by automation."