name: Auto Merge Copilot Fixes

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  auto-merge:
    if: startsWith(github.event.pull_request.head.ref, 'copilot/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      # 1️⃣ Convert Draft → Ready
      - name: Mark PR ready for review
        if: github.event.pull_request.draft == true
        run: gh pr ready ${{ github.event.pull_request.number }} --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_FOR_COPILOT }}

      # 2️⃣ Enable auto-merge so GitHub merges when required checks become green
      - name: Enable auto-merge
        run: gh pr merge ${{ github.event.pull_request.number }} --auto --merge --delete-branch --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_FOR_COPILOT }}